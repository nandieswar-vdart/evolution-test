<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams - ProTasker V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-slate-900 font-sans selection:bg-indigo-100">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-slate-200 p-6">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black">P</div>
                <h1 class="text-2xl font-black tracking-tighter text-slate-800">ProTasker</h1>
            </div>
            <nav class="space-y-1">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3.5 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-2xl font-bold">Home</a>
                <a href="workspaces.html" class="flex items-center gap-3 px-4 py-3.5 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-2xl font-bold">Workspaces</a>
                <a href="teams.html" class="flex items-center gap-3 px-4 py-3.5 bg-indigo-50 text-indigo-700 rounded-2xl font-bold">Teams</a>
                <a href="settings.html" class="flex items-center gap-3 px-4 py-3.5 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-2xl font-bold">Preferences</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="h-20 bg-white border-b border-slate-200 px-10 flex items-center justify-between sticky top-0 z-20">
                <h2 class="text-xl font-black text-slate-800">Teams Management</h2>
                <button class="bg-slate-900 text-white px-6 py-2.5 rounded-2xl font-black shadow-lg">+ New Team</button>
            </header>

            <div class="p-10 max-w-7xl mx-auto grid grid-cols-12 gap-10">
                <div class="col-span-8 space-y-6">
                    <div class="bg-white border border-slate-200 rounded-3xl p-10 shadow-sm">
                        <h3 class="text-xl font-black text-slate-800 mb-8">Active Departments</h3>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-6 border border-slate-100 rounded-2xl hover:bg-slate-50 transition-all cursor-pointer">
                                <div class="flex items-center gap-6">
                                    <div class="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 font-black text-xl">D</div>
                                    <div>
                                        <h4 class="font-black text-slate-800">Design Team</h4>
                                        <p class="text-sm font-bold text-slate-400">12 members • 5 workspaces</p>
                                    </div>
                                </div>
                                <div class="flex -space-x-4">
                                    <img src="https://i.pravatar.cc/100?u=1" class="w-10 h-10 rounded-xl border-4 border-white">
                                    <img src="https://i.pravatar.cc/100?u=2" class="w-10 h-10 rounded-xl border-4 border-white">
                                    <img src="https://i.pravatar.cc/100?u=3" class="w-10 h-10 rounded-xl border-4 border-white">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- New Feature: Storage Gauge -->
                <div class="col-span-4">
                    <div class="bg-slate-900 rounded-3xl p-8 text-white shadow-2xl shadow-slate-300">
                        <h4 class="font-black text-indigo-400 uppercase tracking-widest text-xs mb-6">Storage Assets</h4>
                        <div class="flex items-end gap-2 mb-4">
                            <span class="text-4xl font-black">12.4</span>
                            <span class="text-slate-500 font-bold mb-1">/ 50 GB</span>
                        </div>
                        <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden mb-6">
                            <div class="w-[24%] h-full bg-indigo-500 rounded-full shadow-[0_0_15px_rgba(99,102,241,0.8)]"></div>
                        </div>
                        <p class="text-xs font-bold text-slate-500 leading-relaxed">Your team has used 24.8% of available cloud storage. <span class="text-indigo-400">Upgrade Plan</span></p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
