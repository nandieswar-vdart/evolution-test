
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - ProTasker V1</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 p-6">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold">P</div>
                <h1 class="text-xl font-bold tracking-tight">ProTasker</h1>
            </div>
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">
                    <span>Dashboard</span>
                </a>
                <a href="projects.html" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium">
                    <span>Projects</span>
                </a>
                <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">
                    <span>Settings</span>
                </a>
                <a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">
                    <span>Profile</span>
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-10">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-3xl font-bold text-gray-900">Projects</h2>
                    <p class="text-gray-500 mt-1">Manage and track your active initiatives.</p>
                </div>
                <button onclick="alert('System: Opening New Project Dialog... (Mock)')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors shadow-sm">
                    New Project
                </button>
            </header>

            <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
                <div class="p-4 border-b border-gray-100 flex gap-4">
                    <input type="text" id="projectSearch" placeholder="Search projects..." class="border border-gray-300 rounded px-3 py-2 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="statusFilter" class="border border-gray-300 rounded px-3 py-2 text-sm">
                        <option value="all">All Statuses</option>
                        <option value="active">Active</option>
                        <option value="review">In Review</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <table class="w-full text-left" id="projectsTable">
                    <thead class="bg-gray-50 text-xs font-bold uppercase text-gray-500">
                        <tr>
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4">Owner</th>
                            <th class="px-6 py-4">Progress</th>
                            <th class="px-6 py-4">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-sm">
                        <tr data-status="active">
                            <td class="px-6 py-4 font-medium project-name">Website Redesign</td>
                            <td class="px-6 py-4 text-gray-600">John Doe</td>
                            <td class="px-6 py-4">75%</td>
                            <td class="px-6 py-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-bold">Active</span></td>
                        </tr>
                        <tr data-status="review">
                            <td class="px-6 py-4 font-medium project-name">Backend API</td>
                            <td class="px-6 py-4 text-gray-600">Sarah Smith</td>
                            <td class="px-6 py-4">40%</td>
                            <td class="px-6 py-4"><span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded-full text-xs font-bold">In Review</span></td>
                        </tr>
                        <tr data-status="active">
                            <td class="px-6 py-4 font-medium project-name">Mobile App v2</td>
                            <td class="px-6 py-4 text-gray-600">Mike Wilson</td>
                            <td class="px-6 py-4">10%</td>
                            <td class="px-6 py-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-bold">Active</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const searchInput = document.getElementById('projectSearch');
        const filterSelect = document.getElementById('statusFilter');
        const rows = document.querySelectorAll('#projectsTable tbody tr');

        function filterProjects() {
            const query = searchInput.value.toLowerCase();
            const filterValue = filterSelect.value;

            rows.forEach(row => {
                const name = row.querySelector('.project-name').textContent.toLowerCase();
                const status = row.getAttribute('data-status');
                
                const matchesSearch = name.includes(query);
                const matchesFilter = filterValue === 'all' || status === filterValue;

                if (matchesSearch && matchesFilter) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        searchInput.addEventListener('input', filterProjects);
        filterSelect.addEventListener('change', filterProjects);
    </script>
</body>
</html>
