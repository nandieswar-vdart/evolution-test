
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ProTasker V1</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 p-6">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold">P</div>
                <h1 class="text-xl font-bold tracking-tight">ProTasker</h1>
            </div>
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">
                    <span>Dashboard</span>
                </a>
                <a href="projects.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">
                    <span>Projects</span>
                </a>
                <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">
                    <span>Settings</span>
                </a>
                <a href="profile.html" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium">
                    <span>Profile</span>
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-10">
            <header class="mb-10">
                <h2 class="text-3xl font-bold text-gray-900">My Profile</h2>
                <p class="text-gray-500 mt-1">Manage your identity and bio.</p>
            </header>

            <div class="max-w-2xl bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
                <div class="h-32 bg-blue-600"></div>
                <div class="p-8">
                    <div class="relative -mt-16 mb-6">
                        <img src="https://i.pravatar.cc/150?u=john" alt="Avatar" class="w-24 h-24 rounded-full border-4 border-white shadow-md">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Full Name</label>
                            <input type="text" id="profileName" value="John Doe" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Email Address</label>
                            <input type="email" value="john@protasker.io" class="w-full border border-gray-300 rounded px-3 py-2 text-sm bg-gray-50" disabled>
                        </div>
                        <div class="col-span-2 space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Bio</label>
                            <textarea id="profileBio" rows="4" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">Product Manager based in SF.</textarea>
                        </div>
                    </div>
                    <button onclick="updateProfile()" class="mt-8 bg-gray-900 text-white px-6 py-2 rounded font-bold text-sm hover:bg-gray-800 transition-colors">
                        Update Profile
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script>
        function updateProfile() {
            const name = document.getElementById('profileName').value;
            alert('Success: Profile for ' + name + ' has been updated!');
        }
    </script>
</body>
</html>
