
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - ProTasker V1</title>
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .tab-active { color: #2563eb !important; border-bottom: 2px solid #2563eb !important; font-weight: 700 !important; }
        .tab-inactive { color: #9ca3af !important; border-bottom: 2px solid transparent !important; font-weight: 500 !important; }
        .toggle-active { background-color: #2563eb !important; }
        .toggle-dot-active { left: 1.5rem !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 p-6">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold">P</div>
                <h1 class="text-xl font-bold tracking-tight">ProTasker</h1>
            </div>
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">
                    <span>Dashboard</span>
                </a>
                <a href="projects.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">
                    <span>Projects</span>
                </a>
                <a href="settings.html" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium">
                    <span>Settings</span>
                </a>
                <a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg">
                    <span>Profile</span>
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-10">
            <header class="mb-10">
                <h2 class="text-3xl font-bold text-gray-900">Settings</h2>
                <p class="text-gray-500 mt-1">Adjust your experience and security defaults.</p>
            </header>

            <div class="max-w-2xl bg-white border border-gray-200 rounded-lg shadow-sm">
                <div class="flex border-b border-gray-100" id="tabContainer">
                    <button onclick="switchTab('preferences')" id="btn-preferences" class="px-6 py-4 text-sm tab-active">Preferences</button>
                    <button onclick="switchTab('security')" id="btn-security" class="px-6 py-4 text-sm tab-inactive">Security</button>
                    <button onclick="switchTab('billing')" id="btn-billing" class="px-6 py-4 text-sm tab-inactive">Billing</button>
                </div>
                
                <div id="panel-preferences" class="p-8 space-y-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <h4 class="font-semibold">Dark Mode</h4>
                            <p class="text-sm text-gray-500">Easier on the eyes in low light.</p>
                        </div>
                        <div id="darkModeToggle" class="w-12 h-6 bg-gray-200 rounded-full relative cursor-pointer transition-colors" onclick="toggleSwitch(this)">
                            <div class="w-5 h-5 bg-white rounded-full absolute left-0.5 top-0.5 shadow-sm transition-all duration-200"></div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-gray-700">Language</label>
                        <select class="w-full border border-gray-300 rounded px-3 py-2 text-sm bg-gray-50">
                            <option>English (US)</option>
                            <option>Spanish</option>
                            <option>French</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-gray-700">Timezone</label>
                        <select class="w-full border border-gray-300 rounded px-3 py-2 text-sm bg-gray-50">
                            <option>(UTC-08:00) Pacific Time</option>
                            <option>(UTC-05:00) Eastern Time</option>
                            <option>(UTC+00:00) London</option>
                        </select>
                    </div>
                    <button onclick="saveChanges()" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-lg hover:bg-blue-700 transition-colors mt-4">
                        Save Preferences
                    </button>
                </div>

                <div id="panel-security" class="p-8 hidden">
                    <h3 class="font-bold text-lg mb-4">Security Settings</h3>
                    <p class="text-gray-500 mb-6">Manage your password and session preferences.</p>
                    <button onclick="alert('System: Redirecting to password reset flow...')" class="border border-gray-300 px-4 py-2 rounded-lg text-sm font-bold">Change Password</button>
                </div>

                <div id="panel-billing" class="p-8 hidden">
                    <h3 class="font-bold text-lg mb-4">Billing & Subscription</h3>
                    <p class="text-gray-500 mb-6">You are currently on the **Free Starter Plan**.</p>
                    <button onclick="alert('System: Opening plan selector...')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Upgrade Plan</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        function switchTab(tab) {
            // Update buttons
            ['preferences', 'security', 'billing'].forEach(t => {
                const btn = document.getElementById('btn-' + t);
                const panel = document.getElementById('panel-' + t);
                if (t === tab) {
                    btn.classList.add('tab-active');
                    btn.classList.remove('tab-inactive');
                    panel.classList.remove('hidden');
                } else {
                    btn.classList.remove('tab-active');
                    btn.classList.add('tab-inactive');
                    panel.classList.add('hidden');
                }
            });
        }

        function toggleSwitch(el) {
            el.classList.toggle('toggle-active');
            const dot = el.querySelector('div');
            dot.classList.toggle('toggle-dot-active');
        }

        function saveChanges() {
            const btn = document.querySelector('button[onclick="saveChanges()"]');
            btn.textContent = 'Saving...';
            btn.disabled = true;
            setTimeout(() => {
                btn.textContent = 'Save Preferences';
                btn.disabled = false;
                alert('Success: Settings saved successfully!');
            }, 800);
        }
    </script>
</body>
</html>
