
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspaces - ProTasker V2</title>
    <link href="style.css" rel="stylesheet">
    <style>
        .view-active { background-color: white !important; color: #4f46e5 !important; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .list-view { display: flex; flex-direction: column; gap: 1rem; }
        .list-view .workspace-card { flex-direction: row; align-items: center; padding: 1.5rem; }
        .list-view .workspace-card .card-icon { margin-bottom: 0; margin-right: 1.5rem; width: 3rem; height: 3rem; }
        .list-view .workspace-card .card-header { margin-bottom: 0; flex: 1; }
        .list-view .workspace-card .card-progress { width: 150px; margin: 0 2rem; }
        .list-view .workspace-card .card-footer { border-top: none; padding-top: 0; margin-top: 0; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 font-sans selection:bg-indigo-100">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-slate-200 p-6">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-200">P</div>
                <h1 class="text-2xl font-black tracking-tighter text-slate-800">ProTasker</h1>
            </div>
            <nav class="space-y-1">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3.5 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-2xl font-bold">Home</a>
                <a href="workspaces.html" class="flex items-center gap-3 px-4 py-3.5 bg-indigo-50 text-indigo-700 rounded-2xl font-bold">Workspaces</a>
                <a href="teams.html" class="flex items-center gap-3 px-4 py-3.5 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-2xl font-bold">Teams</a>
                <a href="settings.html" class="flex items-center gap-3 px-4 py-3.5 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-2xl font-bold">Preferences</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="h-20 bg-white border-b border-slate-200 px-10 flex items-center justify-between sticky top-0 z-20">
                <h2 class="text-xl font-black text-slate-800">Your Workspaces</h2>
                <button onclick="alert('Opening Workspace Creator...')" class="bg-indigo-600 text-white px-6 py-2.5 rounded-2xl font-black shadow-lg hover:shadow-indigo-200 transition-all active:scale-95">Create New</button>
            </header>

            <div class="p-10 max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-10 bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
                    <div class="flex gap-4">
                        <input type="text" id="workspaceSearch" placeholder="Filter workspaces..." class="bg-slate-50 border-none rounded-2xl px-5 py-2.5 text-sm w-80 focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                        <div class="flex bg-slate-100 p-1 rounded-2xl">
                            <button onclick="setView('grid')" id="gridBtn" class="view-active px-4 py-1.5 rounded-xl font-black text-xs transition-all">GRID</button>
                            <button onclick="setView('list')" id="listBtn" class="px-4 py-1.5 rounded-xl text-slate-400 font-black text-xs transition-all">LIST</button>
                        </div>
                    </div>
                </div>

                <div id="workspaceGrid" class="grid-view">
                    <div class="workspace-card bg-white border border-slate-200 rounded-[32px] p-8 hover:border-indigo-400 transition-all group shadow-sm hover:shadow-2xl flex flex-col">
                        <div class="card-icon w-12 h-12 bg-indigo-500 rounded-2xl shadow-inner mb-6 flex-shrink-0"></div>
                        <div class="card-header">
                            <h4 class="text-lg font-black text-slate-800 group-hover:text-indigo-600 workspace-name">Website Redesign V3</h4>
                            <p class="text-sm font-bold text-slate-400 mt-1 mb-8 uppercase tracking-widest">John Doe • Active</p>
                        </div>
                        <div class="card-progress w-full h-1.5 bg-slate-50 rounded-full mb-4 overflow-hidden">
                            <div class="w-3/4 h-full bg-indigo-500 rounded-full"></div>
                        </div>
                        <div class="card-footer flex justify-between items-center pt-6 border-t border-slate-50">
                            <span class="text-[10px] font-black text-slate-300">75% COMPLETE</span>
                            <button onclick="archiveWorkspace(this)" class="text-xs font-black text-slate-400 hover:text-red-500">ARCHIVE</button>
                        </div>
                    </div>

                    <div class="workspace-card bg-white border border-slate-200 rounded-[32px] p-8 hover:border-indigo-400 transition-all group shadow-sm hover:shadow-2xl flex flex-col">
                        <div class="card-icon w-12 h-12 bg-pink-500 rounded-2xl shadow-inner mb-6 flex-shrink-0"></div>
                        <div class="card-header">
                            <h4 class="text-lg font-black text-slate-800 group-hover:text-indigo-600 workspace-name">Mobile App Core</h4>
                            <p class="text-sm font-bold text-slate-400 mt-1 mb-8 uppercase tracking-widest">Sarah Smith • On Hold</p>
                        </div>
                        <div class="card-progress w-full h-1.5 bg-slate-50 rounded-full mb-4 overflow-hidden">
                            <div class="w-1/4 h-full bg-pink-500 rounded-full"></div>
                        </div>
                        <div class="card-footer flex justify-between items-center pt-6 border-t border-slate-50">
                            <span class="text-[10px] font-black text-slate-300">22% COMPLETE</span>
                            <button onclick="archiveWorkspace(this)" class="text-xs font-black text-slate-400 hover:text-red-500">ARCHIVE</button>
                        </div>
                    </div>

                    <div class="workspace-card bg-white border border-slate-200 rounded-[32px] p-8 hover:border-indigo-400 transition-all group shadow-sm hover:shadow-2xl flex flex-col">
                        <div class="card-icon w-12 h-12 bg-emerald-500 rounded-2xl shadow-inner mb-6 flex-shrink-0"></div>
                        <div class="card-header">
                            <h4 class="text-lg font-black text-slate-800 group-hover:text-indigo-600 workspace-name">API Documentation</h4>
                            <p class="text-sm font-bold text-slate-400 mt-1 mb-8 uppercase tracking-widest">Leo Ray • Complete</p>
                        </div>
                        <div class="card-progress w-full h-1.5 bg-slate-50 rounded-full mb-4 overflow-hidden">
                            <div class="w-full h-full bg-emerald-500 rounded-full"></div>
                        </div>
                        <div class="card-footer flex justify-between items-center pt-6 border-t border-slate-50">
                            <span class="text-[10px] font-black text-slate-300">100% COMPLETE</span>
                            <button onclick="archiveWorkspace(this)" class="text-xs font-black text-slate-400 hover:text-red-500">ARCHIVE</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function setView(mode) {
            const grid = document.getElementById('workspaceGrid');
            const gBtn = document.getElementById('gridBtn');
            const lBtn = document.getElementById('listBtn');

            if (mode === 'grid') {
                grid.className = 'grid-view';
                gBtn.classList.add('view-active', 'text-indigo-600');
                gBtn.classList.remove('text-slate-400');
                lBtn.classList.remove('view-active', 'text-indigo-600');
                lBtn.classList.add('text-slate-400');
            } else {
                grid.className = 'list-view';
                lBtn.classList.add('view-active', 'text-indigo-600');
                lBtn.classList.remove('text-slate-400');
                gBtn.classList.remove('view-active', 'text-indigo-600');
                gBtn.classList.add('text-slate-400');
            }
        }

        function archiveWorkspace(btn) {
            const card = btn.closest('.workspace-card');
            const name = card.querySelector('.workspace-name').textContent;
            if (confirm(`Are you sure you want to archive "${name}"?`)) {
                card.style.opacity = '0.5';
                btn.textContent = 'ARCHIVED';
                btn.disabled = true;
                btn.classList.replace('hover:text-red-500', 'text-slate-300');
            }
        }

        const search = document.getElementById('workspaceSearch');
        search.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.workspace-card');
            cards.forEach(card => {
                const name = card.querySelector('.workspace-name').textContent.toLowerCase();
                card.style.display = name.includes(query) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
